<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brian · Finanças — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080c14;color:#e2e8f0;
  font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.card{
  background:#0f1623;border:1px solid #1e2d45;
  border-radius:20px;padding:40px 36px;width:100%;max-width:380px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
.logo-icon{
  width:44px;height:44px;border-radius:13px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 20px rgba(99,102,241,.4);
}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-.4px}
.logo-text span{color:#818cf8}
h2{font-size:15px;font-weight:600;color:#94a3b8;text-align:center;margin-bottom:24px}
label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
input[type=password]{
  width:100%;background:#161e2e;border:1px solid #253550;
  border-radius:10px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:15px;
  padding:12px 14px;outline:none;transition:.15s;margin-bottom:16px;
}
input[type=password]:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
button{
  width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;border:none;border-radius:10px;
  padding:13px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.15s;letter-spacing:.2px;
  box-shadow:0 4px 16px rgba(99,102,241,.4);
}
button:hover{opacity:.88}
.error{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;margin-bottom:16px;
  font-size:12.5px;color:#fca5a5;text-align:center;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-text">Brian <span>Finanças</span></div>
  </div>
  <h2>Acesso privado</h2>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Senha</label>
    <input type="password" name="senha" autofocus placeholder="••••••••"/>
    <button type="submit">Entrar →</button>
  </form>
</div>
</body>
</html>
