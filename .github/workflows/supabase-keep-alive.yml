name: Supabase Keep-Alive

# Roda automaticamente a cada 3 dias às 10h UTC (07h horário de Brasília)
# Garante que o projeto Supabase nunca fique 7 dias sem atividade
on:
  schedule:
    - cron: '0 13 */3 * *'   # a cada 3 dias — 10h horário de Brasília
  workflow_dispatch:           # permite rodar manualmente se precisar

jobs:
  ping:
    name: Manter Supabase ativo
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cathhujdhocioybdpnvc.supabase.co/rest/v1/accounts?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhdGhodWpkaG9jaW95YmRwbnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTUxODgsImV4cCI6MjA5MTI5MTE4OH0.5zO8sxWV1R_fVt9FPN4bDGXaCophee4gCh0jjEVp9DQ" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhdGhodWpkaG9jaW95YmRwbnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTUxODgsImV4cCI6MjA5MTI5MTE4OH0.5zO8sxWV1R_fVt9FPN4bDGXaCophee4gCh0jjEVp9DQ")

          echo "Status HTTP: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Supabase ativo e respondendo."
          else
            echo "⚠️ Supabase retornou status inesperado: $HTTP_STATUS"
            exit 1
          fi

      - name: Log horário do ping
        run: |
          echo "🕐 Ping realizado em: $(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M (horário de Brasília)')"
